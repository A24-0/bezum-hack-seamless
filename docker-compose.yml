version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: seamless
      POSTGRES_USER: seamless
      POSTGRES_PASSWORD: seamless
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seamless"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://seamless:seamless@db:5432/seamless
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      JITSI_DOMAIN: ${JITSI_DOMAIN:-meet.jit.si}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
