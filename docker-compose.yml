services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seamless}
      POSTGRES_USER: ${POSTGRES_USER:-seamless}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seamless}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seamless}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-seamless}:${POSTGRES_PASSWORD:-seamless}@db:5432/${POSTGRES_DB:-seamless}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral}
      JITSI_DOMAIN: ${JITSI_DOMAIN:-meet.jit.si}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_API_URL: ${GITLAB_API_URL:-https://gitlab.com/api/v4}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      UPLOAD_DIR: /app/uploads
    volumes:
      - seamless_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  seamless_uploads:
